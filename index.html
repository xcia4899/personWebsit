<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <title>個人網站</title>
  <link rel="stylesheet" href="./assets/css/style.css" />

<body data-theme="light">

    <main id="main" class="main">
      <section class="person-Intro">
        <div class="Intro-header">
          <div class="intro-profile">
            <figure class="img">
              <img src="./assets/images/Headshot.jpeg" alt="">
            </figure>
            <div class="">
              <h4 class="">HELLO, WORLD.</h4>
              <h3 class="name">陳冠瑀</h3>
            </div>
          </div>
        </div>

      </section>

      <section class="aboutMe">
        <h2>履歷</h2>
      </section>

      <section class="work">
        <h1>作品</h1>
        <figure>圖片</figure>
        <a href="">連結</a>
      </section>


    </main>
  </div>
  <div class="back">
    <div class="container">
      <div id="stars"></div>
      <div id="stars2"></div>
      <div id="stars3"></div>
      <div></div>
    </div>
  </div>
  <script type="module" src="./assets/js/main.js"></script>

</body>

</html>
